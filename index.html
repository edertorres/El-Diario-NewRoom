<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IDML Injector Pro</title>
    <!-- Load JSZip for IDML file handling -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" defer></script>
    <!-- PDF.js for PDF rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs" type="module" async defer></script>
    <script async defer>
      // Exponer pdfjsLib globalmente para compatibilidad
      import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs').then(module => {
        window.pdfjsLib = module;
      });
    </script>
    <!-- Google Identity Services for OAuth 2.0 -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- Google API Client Library for Drive API and Picker -->
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <script src="https://apis.google.com/js/picker.js" async defer></script>
    <link rel="preload" href="/index.css" as="style">
    <link rel="stylesheet" href="/index.css">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
