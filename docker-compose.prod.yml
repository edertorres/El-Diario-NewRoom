version: '3.8'

services:
  # Frontend con Nginx (Pre-compilado en GitHub Actions)
  frontend:
    image: ghcr.io/edertorres/el-diario-newroom-frontend:latest
    #    ports:
    #      - "3000:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`newsroom.rreditores.com`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    restart: always
    networks:
      - idml-network

  # Backend (Preview Service) con Scribus y Typst
  backend:
    image: ghcr.io/edertorres/el-diario-newroom-backend:latest
    #    ports:
    #      - "8000:8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api-redaccion.rreditores.com`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
    volumes:
      # Volúmenes persistentes para evitar pérdida de datos en despliegues
      - preview-data:/app/uploads
      - preview-output:/app/output
    environment:
      - NODE_ENV=production
    restart: always
    networks:
      - idml-network

volumes:
  preview-data:
    driver: local
  preview-output:
    driver: local

networks:
  idml-network:
    driver: bridge
