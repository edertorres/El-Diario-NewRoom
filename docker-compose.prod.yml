version: '3.8'

services:
  # Frontend con Nginx (Compilado para producción)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "3000:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN_FRONTEND}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    restart: always
    networks:
      - idml-network

  # Backend (Preview Service) con Scribus y Typst
  backend:
    build:
      context: ./preview-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`${DOMAIN_BACKEND}`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
    volumes:
      # Volúmenes persistentes para evitar pérdida de datos en despliegues
      - preview-data:/app/uploads
      - preview-output:/app/output
    environment:
      - NODE_ENV=production
    restart: always
    networks:
      - idml-network

volumes:
  preview-data:
    driver: local
  preview-output:
    driver: local

networks:
  idml-network:
    driver: bridge
