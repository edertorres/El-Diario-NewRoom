name: Build and Push Docker Images

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PREFIX: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}-backend

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./preview-service
          push: true
          tags: ${{ env.REGISTRY }}/edertorres/el-diario-newroom-backend:latest
          labels: ${{ steps.meta-backend.outputs.labels }}

      - name: Extract metadata (tags, labels) for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/edertorres/el-diario-newroom-frontend

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: ${{ env.REGISTRY }}/edertorres/el-diario-newroom-frontend:latest
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VITE_GOOGLE_DRIVE_CLIENT_ID=${{ secrets.VITE_GOOGLE_DRIVE_CLIENT_ID }}
            VITE_GOOGLE_DRIVE_API_KEY=${{ secrets.VITE_GOOGLE_DRIVE_API_KEY }}
            VITE_GOOGLE_DRIVE_CLIENT_SECRET=${{ secrets.VITE_GOOGLE_DRIVE_CLIENT_SECRET }}
            VITE_DRIVE_TEMPLATES_FOLDER_ID=${{ secrets.VITE_DRIVE_TEMPLATES_FOLDER_ID }}
            VITE_DRIVE_DESTINATION_FOLDER_ID=${{ secrets.VITE_DRIVE_DESTINATION_FOLDER_ID }}
            VITE_GOOGLE_SHEETS_LOG_ID=${{ secrets.VITE_GOOGLE_SHEETS_LOG_ID }}
            VITE_PREVIEW_API_URL=/api-preview
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            VITE_DEEPSEEK_API_KEY=${{ secrets.VITE_DEEPSEEK_API_KEY }}
            VITE_STORAGE_MODE=both
            VITE_NEXTCLOUD_URL=${{ secrets.VITE_NEXTCLOUD_URL }}
            VITE_NEXTCLOUD_CLIENT_ID=${{ secrets.VITE_NEXTCLOUD_CLIENT_ID }}
            VITE_NEXTCLOUD_CLIENT_SECRET=${{ secrets.VITE_NEXTCLOUD_CLIENT_SECRET }}
            VITE_NEXTCLOUD_TEMPLATES_PATH=${{ secrets.VITE_NEXTCLOUD_TEMPLATES_PATH }}
            VITE_NEXTCLOUD_DESTINATION_PATH=${{ secrets.VITE_NEXTCLOUD_DESTINATION_PATH }}
